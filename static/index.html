<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ave</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #eaeaea;
  border-right: 1px solid #ccc;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 15px;
  font-weight: bold;
  background: #ddd;
}

.conversation {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #ddd;
}

.conversation:hover {
  background: #d6d6d6;
}

/* CHAT */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: white;
}

.chat-header {
  background: #4a90e2;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat-messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  max-width: 75%;
}

.user {
  background: #4a90e2;
  color: white;
  margin-left: auto;
}

.assistant {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
}

/* INPUT */
.chat-input {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.chat-input button {
  padding: 10px 15px;
  border: none;
  background: #4a90e2;
  color: white;
  cursor: pointer;
}

.chat-input button:hover {
  background: #357ab8;
}

.chat-input input:disabled {
  background: #f2f2f2;
}

.new-chat-btn {
  margin: 10px;
  padding: 10px;
  border: none;
  background: #4a90e2;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
}

.new-chat-btn:hover {
  background: #357ab8;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">Histórico</div>
  <button class="new-chat-btn" onclick="newChat()">
    + Novo chat
  </button>
  <div id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="chat-header">ave chat</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let conversationId = sessionStorage.getItem("conversation_id");
if (!conversationId) {
  conversationId = crypto.randomUUID();
  sessionStorage.setItem("conversation_id", conversationId);
}

let isReadOnly = false;

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

/* =========================
   MENSAGENS
========================= */
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerHTML = marked.parse(text);
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* =========================
   ENVIAR MENSAGEM
========================= */
async function sendMessage() {
  if (isReadOnly) return;

  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const response = await fetch("http://127.0.0.1:8000/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      conversation_id: conversationId,
      message: text
    })
  });

  const data = await response.json();

  if (data.error) {
    addMessage(data.message, "assistant");
  } else {
    addMessage(data.response, "assistant");
  }
}

/* =========================
   CARREGAR CONVERSA
========================= */
async function loadConversation(id, readonly = false) {
  conversationId = id;
  sessionStorage.setItem("conversation_id", id);

  isReadOnly = readonly;
  input.disabled = readonly;

  const res = await fetch(`http://127.0.0.1:8000/conversations/${id}/messages`);
  const data = await res.json();

  messagesDiv.innerHTML = "";

  data.forEach(msg => {
    addMessage(msg.content, msg.role);
  });
}

/* =========================
   NOVA CONVERSA (BOTÃO)
========================= */
function newChat() {
  const id = crypto.randomUUID();

  conversationId = id;
  sessionStorage.setItem("conversation_id", id);

  isReadOnly = false;
  input.disabled = false;

  messagesDiv.innerHTML = "";

  // opcional: atualizar histórico sem reload
  loadHistory();
}

/* =========================
   HISTÓRICO
========================= */
async function loadHistory() {
  const res = await fetch("http://127.0.0.1:8000/historico");
  const data = await res.json();

  historyDiv.innerHTML = "";

  data.forEach(conv => {
    const div = document.createElement("div");
    div.className = "conversation";
    div.innerText = conv.last_message || "Nova conversa";

    div.onclick = () => {
      loadConversation(conv.id, true);
    };

    historyDiv.appendChild(div);
  });
}

/* =========================
   INIT
========================= */
loadHistory();
loadConversation(conversationId, false);

/* ENTER */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
