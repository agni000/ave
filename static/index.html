<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ave</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #eaeaea;
  border-right: 1px solid #ccc;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 15px;
  font-weight: bold;
  background: #ddd;
}

.conversation {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #ddd;
}

.conversation:hover {
  background: #d6d6d6;
}

/* CHAT AREA */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: white;
}

.chat-header {
  background: #4a90e2;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat-messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  max-width: 75%;
}

.user {
  background: #4a90e2;
  color: white;
  margin-left: auto;
}

.bot {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
}

/* INPUT */
.chat-input {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.chat-input button {
  padding: 10px 15px;
  border: none;
  background: #4a90e2;
  color: white;
  cursor: pointer;
}

.chat-input button:hover {
  background: #357ab8;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">Histórico</div>
  <div id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="chat-header">ave chat</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let conversationId = sessionStorage.getItem("conversation_id");

if (!conversationId) {
  conversationId = crypto.randomUUID();
  sessionStorage.setItem("conversation_id", conversationId);
}

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

/* Adiciona mensagem no chat atual */
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerHTML = marked.parse(text);
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* Envia a mensagem para o servidor */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const response = await fetch("http://127.0.0.1:8000/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      conversation_id: conversationId,
      message: text
    })
  });

  const data = await response.json();

  if (data.error) {
    addMessage(data.message, "bot");
  } else {
    addMessage(data.response, "bot");
  }
}

/* Carrega o preview do histórico de mensagens */
async function loadHistory() {
  const res = await fetch("http://127.0.0.1:8000/historico");
  const data = await res.json();

  historyDiv.innerHTML = "";

  data.forEach(conv => {
    const div = document.createElement("div");
    div.className = "conversation";
    div.innerText = conv.last_message || "Nova conversa";

    div.onclick = () => {
      sessionStorage.setItem("conversation_id", conv.id);
      location.reload();
    };

    historyDiv.appendChild(div);
  });
}

loadHistory();

/* Evento associado ao enter */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
