<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ave</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>

<body>
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">Histórico</div>
  <button class="new-chat-btn" onclick="newChat()">
    + Novo chat
  </button>
  <div id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="chat-header">ave chat</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let conversationId = sessionStorage.getItem("conversation_id");
if (!conversationId) {
  conversationId = crypto.randomUUID();
  sessionStorage.setItem("conversation_id", conversationId);
}

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

/* =========================
  ADICIONAR MENSAGEM
========================= */
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerHTML = marked.parse(text);
  messagesDiv.appendChild(msg);
  
  renderMathInElement(msg, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false}
    ]
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* =========================
   ENVIAR MENSAGEM
========================= */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typingMsg = showTyping();

  try {
    const response = await fetch("http://127.0.0.1:8000/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        conversation_id: conversationId,
        message: text
      })
    });

    typingMsg.remove();

    if (!response.ok) {
      const errorData = await response.json();
      addMessage(errorData.detail, "assistant");
      return;
    }

    const data = await response.json();
    addMessage(data.response, "assistant");
    loadHistory();

  } catch (err) {
    typingMsg.remove();
    addMessage("Não foi possível conectar ao servidor", "assistant"); 
  }  
}

/* =========================
   MENSAGEM SIMPLES DE DIGITAÇÃO PARA O USUÁRIO
========================= */
function showTyping() {
  const msg = document.createElement("div");
  msg.classList.add("message", "assistant", "typing");
  msg.innerText = "Digitando...";
  
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  return msg; 
}

/* =========================
   CARREGAR CONVERSA
========================= */
async function loadConversation(id) {
  conversationId = id;
  sessionStorage.setItem("conversation_id", id);

  const res = await fetch(`http://127.0.0.1:8000/conversations/${id}/messages`);
  const data = await res.json();

  messagesDiv.innerHTML = "";

  data.forEach(msg => {
    addMessage(msg.content, msg.role);
  });
}

/* =========================
   NOVA CONVERSA (BOTÃO)
========================= */
function newChat() {
  const id = crypto.randomUUID();

  conversationId = id;
  sessionStorage.setItem("conversation_id", id);
  messagesDiv.innerHTML = "";

  // opcional: atualizar histórico sem reload
  loadHistory();
}

/* =========================
   HISTÓRICO
========================= */
async function loadHistory() {
  const res = await fetch("http://127.0.0.1:8000/conversations");
  const data = await res.json();

  historyDiv.innerHTML = "";

  data.forEach(conv => {
    const div = document.createElement("div");
    div.className = "conversation";
    div.innerText = conv.last_message || "Nova conversa";

    div.onclick = () => {
      loadConversation(conv.id);
    };

    historyDiv.appendChild(div);
  });
}

/* =========================
   INIT
========================= */
loadHistory();
loadConversation(conversationId);

/* ENTER */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
