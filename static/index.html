<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ave</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">Histórico</div>
  <button class="new-chat-btn" onclick="newChat()">
    + Novo chat
  </button>
  <div id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="chat-header">ave chat</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let conversationId = sessionStorage.getItem("conversation_id");
if (!conversationId) {
  conversationId = crypto.randomUUID();
  sessionStorage.setItem("conversation_id", conversationId);
}

let isReadOnly = false;

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

/* =========================
   MENSAGENS
========================= */
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerHTML = marked.parse(text);
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* =========================
   ENVIAR MENSAGEM
========================= */
async function sendMessage() {
  if (isReadOnly) return;

  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const response = await fetch("http://127.0.0.1:8000/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      conversation_id: conversationId,
      message: text
    })
  });

  const data = await response.json();

  if (data.error) {
    addMessage(data.message, "assistant");
  } else {
    addMessage(data.response, "assistant");
  }
}

/* =========================
   CARREGAR CONVERSA
========================= */
async function loadConversation(id, readonly = false) {
  conversationId = id;
  sessionStorage.setItem("conversation_id", id);

  isReadOnly = readonly;
  input.disabled = readonly;

  const res = await fetch(`http://127.0.0.1:8000/conversations/${id}/messages`);
  const data = await res.json();

  messagesDiv.innerHTML = "";

  data.forEach(msg => {
    addMessage(msg.content, msg.role);
  });
}

/* =========================
   NOVA CONVERSA (BOTÃO)
========================= */
function newChat() {
  const id = crypto.randomUUID();

  conversationId = id;
  sessionStorage.setItem("conversation_id", id);

  isReadOnly = false;
  input.disabled = false;

  messagesDiv.innerHTML = "";

  // opcional: atualizar histórico sem reload
  loadHistory();
}

/* =========================
   HISTÓRICO
========================= */
async function loadHistory() {
  const res = await fetch("http://127.0.0.1:8000/historico");
  const data = await res.json();

  historyDiv.innerHTML = "";

  data.forEach(conv => {
    const div = document.createElement("div");
    div.className = "conversation";
    div.innerText = conv.last_message || "Nova conversa";

    div.onclick = () => {
      loadConversation(conv.id, true);
    };

    historyDiv.appendChild(div);
  });
}

/* =========================
   INIT
========================= */
loadHistory();
loadConversation(conversationId, false);

/* ENTER */
input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
